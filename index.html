<!-- ===== Header ===== -->
<header class="site-header">

        <a href="./index.html" class="logo-link logo-link--lg" aria-label="nvkhuy games — Home">

<!-- ===== Main Content ===== -->
<main>

    <!-- Games -->
    <section class="games-section" id="our-games" aria-labelledby="games-heading">
        <div class="container">
            <div class="games-section__inner anim-fade-up">
                <h1 id="games-heading" class="section-title games-section__title">Our Games</h1>

                <div class="grid-auto games-section__grid">
                    <a href="https://play.google.com/store/apps/details?id=nvkhuy.com.fatguydefense&hl=vi&gl=US"
                       target="_blank"
                       rel="noopener noreferrer"
                       class="game-card">
                        <img src="./static/burger-defense.png"
                             alt="Burger Defense — a fun tower defense game"
                             class="game-card__image"
                             width="160" height="160"
                             loading="lazy">
                        <span class="game-card__name">Burger Defense</span>
                    </a>
                </div>

                <div class="games-section__cta">
                    <a href="https://play.google.com/store/apps/dev?id=7775537027678361006&hl=vi&gl=US"
                       target="_blank"
                       rel="noopener noreferrer"
                       class="btn btn--primary">
                        More Games
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Stats -->

        <div class="container">

                    <img src="./static/download.png" alt="Downloads icon" class="stat-card__icon" width="80" height="80" loading="lazy">
                    <div class="stat-card__content">
                        <span class="stat-card__number">1.5B+</span>
                        <span class="stat-card__label">Downloads</span>
                    </div>
                    <hr class="stat-card__divider">
                </article>

                <article class="stat-card anim-fade-up anim-delay-1">
                    <img src="./static/heart.png" alt="Monthly active users icon" class="stat-card__icon" width="80" height="80" loading="lazy">
                    <div class="stat-card__content">
                        <span class="stat-card__number">80M+</span>
                        <span class="stat-card__label">MAU</span>
                    </div>
                    <hr class="stat-card__divider">
                </article>

                <article class="stat-card anim-fade-up anim-delay-2">
                    <img src="./static/star.png" alt="Number one games icon" class="stat-card__icon" width="80" height="80" loading="lazy">
                    <div class="stat-card__content">
                        <span class="stat-card__number">#1</span>
                        <span class="stat-card__label">Games</span>
                    </div>
                    <hr class="stat-card__divider">

            </div>
        </div>
