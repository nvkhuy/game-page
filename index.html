<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" href="static/nvkhuy-logo.png" type="image/png">
    <link rel="icon" type="image/png" sizes="192x192" href="static/nvkhuy-logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="static/nvkhuy-logo.png">

    <!-- SEO -->
    <title>nvkhuy games — Epic Fun Mobile Games</title>
    <meta name="description" content="Discover fun mobile games by nvkhuy. Play Loop Sort, Animal Sort, Fruit Merge, Flower Sort and more.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Luckiest+Guy&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="static/css/tokens.css">
    <link rel="stylesheet" href="static/css/base.css">
    <link rel="stylesheet" href="static/css/layout.css">
    <link rel="stylesheet" href="static/css/components.css">
    <link rel="stylesheet" href="static/css/animations.css">
    <link rel="stylesheet" href="static/css/pages/home.css">
</head>

<body>

<header class="site-header">
    <div class="container flex-between">
        <a href="./index.html" class="logo-link logo-link--lg" aria-label="nvkhuy games — Home">
            <img src="static/nvkhuy-logo.png" alt="nvkhuy games logo" width="64" height="64">
        </a>
        <nav class="site-footer__nav" style="margin-bottom: 0;">
             <a href="#android-games">Android</a>
             <a href="#ios-games">iOS</a>
             <a href="mailto:khanhhuynguyenvu@gmail.com">Contact</a>
        </nav>
    </div>
</header>

<main>
    <!-- Hero Section -->
    <section class="hero">
        <div class="container anim-fade-up">
            <h1 class="hero__title anim-float">NVKHUY GAMES</h1>
            <p class="hero__subtitle">Fun & Tap</p>
            <div class="hero__btns">
                <a href="#android-games" class="btn btn--primary">Android Games</a>
                <a href="#ios-games" class="btn btn--secondary">iOS Games</a>
            </div>
        </div>
    </section>

    <!-- Android Games Section -->
    <section class="games-section" id="android-games">
        <div class="container anim-fade-up anim-delay-1">
            <h2 class="section-title">Android Games</h2>
            <div class="grid-auto" id="android-grid">
                <!-- Loaded from static.json -->
            </div>
            <div class="games-section__cta">
                <a href="#" id="android-dev-link" target="_blank" rel="noopener noreferrer" class="btn btn--secondary">
                    View All on Google Play
                </a>
            </div>
        </div>
    </section>

    <!-- iOS Games Section -->
    <section class="games-section" id="ios-games" style="background: var(--color-bg-alt);">
        <div class="container anim-fade-up anim-delay-2">
            <h2 class="section-title">iOS Games</h2>
            <div class="grid-auto" id="ios-grid">
                <!-- Loaded from static.json -->
            </div>
            <div class="games-section__cta">
                <a href="#" id="ios-dev-link" target="_blank" rel="noopener noreferrer" class="btn btn--primary">
                    View All on App Store
                </a>
            </div>
        </div>
    </section>
</main>

<footer class="site-footer">
    <div class="container stack stack--lg">
        <div class="flex-center">
            <a href="./index.html" class="logo-link logo-link--sm">
                <img src="static/nvkhuy-logo.png" alt="nvkhuy games" width="48" height="48">
            </a>
        </div>
        <nav class="site-footer__nav">
            <a href="./term-of-use/index.html">Terms of Use</a>
            <a href="./privacy-policy/index.html">Privacy Policy</a>
            <a href="mailto:khanhhuynguyenvu@gmail.com">Support</a>
        </nav>
        <p class="site-footer__copy">© 2024 nvkhuy games. Made with 🕹️ for players everywhere.</p>
    </div>
</footer>

<script>
    async function loadGames() {
        try {
            const response = await fetch('static/games.json');
            const data = await response.json();


            // Setup Android
            const androidGrid = document.getElementById('android-grid');
            document.getElementById('android-dev-link').href = data.android.developer_url;
            androidGrid.innerHTML = data.android.games.map(game => createGameCard(game, 'Android')).join('');

            // Setup iOS
            const iosGrid = document.getElementById('ios-grid');
            document.getElementById('ios-dev-link').href = data.ios.developer_url;
            iosGrid.innerHTML = data.ios.games.map(game => createGameCard(game, 'iOS')).join('');

        } catch (error) {
            console.error('Error loading games:', error);
        }
    }

    function createGameCard(game, platform) {
        const badgeClass = platform.toLowerCase() === 'ios' ? 'platform-badge--ios' : '';
        return `
            <a href="${game.url}" target="_blank" rel="noopener noreferrer" class="game-card">
                <div class="platform-badge ${badgeClass}">${platform}</div>
                <img src="${game.image}" alt="${game.name}" class="game-card__image" loading="lazy">
                <span class="game-card__name">${game.name}</span>
            </a>
        `;
    }

    loadGames();
</script>

</body>
</html>
